# Decap CMS content model for Athlone GAA.
# Local editing: run `npm run cms` next to `npm run dev`, open /admin/index.html.
# Production: host on Netlify + enable Identity/Git Gateway, or switch backend to `github`.
#
# Each news item, product and game is its own file in content/, so the
# editorial workflow applies: Save = draft on the Workflow board,
# Publish = live on the site.

backend:
  name: git-gateway
  branch: master

# Lets decap-server proxy edits straight into the local git repo during development
local_backend: true

logo_url: /assets/imgImage232.png

# Save first, publish second
publish_mode: editorial_workflow

media_folder: 'public/uploads'
public_folder: '/uploads'

site_url: /
display_url: /

collections:
  - name: 'news'
    label: 'News'
    label_singular: 'news item'
    description: 'Match reports and club notes. The newest story is featured on the News page.'
    folder: 'content/news'
    create: true
    format: 'json'
    extension: 'json'
    identifier_field: 'title'
    summary: '{{title}} — {{date}}'
    sortable_fields: ['date', 'title', 'category']
    fields:
      - { name: 'title', label: 'Headline', widget: 'string' }
      - { name: 'date', label: 'Date', widget: 'string', hint: 'Written out, e.g. 02 March 2026' }
      - name: 'category'
        label: 'Category'
        widget: 'select'
        options: ['Match Report', 'Club News', 'Team News', 'Fundraising']
      - { name: 'image', label: 'Photo', widget: 'image', required: false }
      - { name: 'excerpt', label: 'Summary', widget: 'text', hint: 'One or two sentences shown under the headline' }
      - { name: 'order', label: 'Order', widget: 'hidden', required: false }

  - name: 'shop'
    label: 'Shop'
    label_singular: 'product'
    description: 'Products in the club shop. Mark exactly one product as featured for the big banner.'
    folder: 'content/shop'
    create: true
    format: 'json'
    extension: 'json'
    identifier_field: 'name'
    summary: '{{name}} — €{{price}}'
    sortable_fields: ['name', 'price', 'category']
    view_groups:
      - { label: 'Category', field: 'category' }
    fields:
      - { name: 'name', label: 'Name', widget: 'string' }
      - { name: 'price', label: 'Price (€)', widget: 'number', value_type: 'int', min: 0 }
      - { name: 'image', label: 'Product photo', widget: 'image', required: false, hint: 'Real photo of the item. If left empty the tile shows the chalk drawing instead' }
      - name: 'category'
        label: 'Category'
        widget: 'select'
        options:
          - { label: 'Jerseys', value: 'jerseys' }
          - { label: 'Balls', value: 'balls' }
          - { label: 'Hurleys', value: 'hurleys' }
      - name: 'art'
        label: 'Chalk drawing'
        widget: 'select'
        hint: 'The line drawing shown on the product tile'
        options:
          - { label: 'Jersey (hoops)', value: 'jersey' }
          - { label: 'Jersey (chest band)', value: 'jersey-away' }
          - { label: 'Football', value: 'football' }
          - { label: 'Sliotar', value: 'sliotar' }
          - { label: 'Hurley', value: 'hurley' }
      - { name: 'badge', label: 'Corner badge', widget: 'string', required: false, hint: 'Short label like NEW SEASON or HAND MADE' }
      - { name: 'link', label: "O'Neills product link", widget: 'string', required: false, hint: "Optional. Link to this exact item on O'Neills. If left blank, the Buy button falls back to the club store URL in Site Settings" }
      - { name: 'desc', label: 'Description', widget: 'text' }
      - name: 'options'
        label: 'Sizes'
        widget: 'list'
        required: false
        hint: 'One size per row, e.g. S, M, L or 30", 32"'
        field: { name: 'size', label: 'Size', widget: 'string' }
      - { name: 'featured', label: 'Featured product', widget: 'boolean', required: false }
      - { name: 'id', label: 'Product code', widget: 'hidden', required: false }
      - { name: 'order', label: 'Order', widget: 'hidden', required: false }

  - name: 'fixtures'
    label: 'Fixtures & Results'
    label_singular: 'game'
    description: 'The scoreboard. Tick "Played" and fill in the scores when the final whistle goes.'
    folder: 'content/fixtures'
    create: true
    format: 'json'
    extension: 'json'
    identifier_field: 'date'
    slug: '{{fields.date}}-{{fields.code}}'
    summary: '{{date}} — {{competition}}'
    sortable_fields: ['month', 'date', 'competition']
    view_groups:
      - { label: 'Month', field: 'month' }
      - { label: 'Code', field: 'code' }
    fields:
      - name: 'month'
        label: 'Month'
        widget: 'select'
        options: ['January', 'February', 'March', 'April', 'May', 'June', 'July']
      - { name: 'date', label: 'Match day', widget: 'string', hint: 'All caps, e.g. SUNDAY 01 MARCH' }
      - { name: 'competition', label: 'Competition', widget: 'string' }
      - name: 'code'
        label: 'Code'
        widget: 'select'
        options:
          - { label: 'Football', value: 'football' }
          - { label: 'Hurling', value: 'hurling' }
      - { name: 'played', label: 'Played (full time)', widget: 'boolean', default: false }
      - { name: 'homeScore', label: 'Athlone score', widget: 'string', required: false, hint: 'Goals-points, e.g. 0-17. Leave blank for upcoming games' }
      - { name: 'awayScore', label: 'Opposition score', widget: 'string', required: false }
      - { name: 'throwIn', label: 'Throw-in time', widget: 'string', required: false, hint: 'For upcoming games, e.g. 2:00 PM' }
      - { name: 'venue', label: 'Venue', widget: 'string' }
      - { name: 'referee', label: 'Referee', widget: 'string', default: 'TBC' }
      - { name: 'order', label: 'Order', widget: 'hidden', required: false }

  - name: 'sponsors'
    label: 'Sponsors'
    label_singular: 'sponsor'
    description: 'Club sponsors shown on the home page. The principal sponsor gets the big board.'
    folder: 'content/sponsors'
    create: true
    format: 'json'
    extension: 'json'
    identifier_field: 'name'
    summary: '{{name}} — {{tier}}'
    sortable_fields: ['tier', 'name']
    view_groups:
      - { label: 'Tier', field: 'tier' }
    fields:
      - { name: 'name', label: 'Business name', widget: 'string' }
      - name: 'tier'
        label: 'Tier'
        widget: 'select'
        hint: 'Principal is the headline sponsor (only pick one). Partners and supporters scroll on the boards.'
        options:
          - { label: 'Principal sponsor', value: 'principal' }
          - { label: 'Partner', value: 'partner' }
          - { label: 'Supporter', value: 'supporter' }
      - { name: 'logo', label: 'Logo', widget: 'image', required: false, hint: 'Upload the logo. If empty, the business name is shown as text on the board' }
      - { name: 'url', label: 'Website', widget: 'string', required: false, hint: 'Full link, e.g. https://example.ie. Leave blank if none' }
      - { name: 'order', label: 'Order', widget: 'hidden', required: false }

  - name: 'settings'
    label: 'Site Settings'
    description: 'One-off settings that apply across the whole site.'
    files:
      - name: 'store'
        label: "Shop & O'Neills"
        file: 'content/settings.json'
        fields:
          - { name: 'oneillsUrl', label: "O'Neills club store URL", widget: 'string', hint: "Your club's official store on oneills.com. Shown as the shop banner and used for official-kit buttons" }
          - { name: 'oneillsNote', label: 'Store note', widget: 'string', required: false }
          - { name: 'ticketmasterUrl', label: 'Ticketmaster link', widget: 'string', required: false, hint: 'Where fans buy match tickets online' }
          - { name: 'centraUrl', label: 'Centra store finder link', widget: 'string', required: false, hint: 'Store locator for in-person ticket sales' }
          - { name: 'supervaluUrl', label: 'SuperValu store finder link', widget: 'string', required: false, hint: 'Store locator for in-person ticket sales' }
